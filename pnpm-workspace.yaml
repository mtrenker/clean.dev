packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - core-js-pure
  - esbuild
  - sharp
  - unrs-resolver

overrides:
  # Storybook's react-docgen still permits vulnerable Babel releases.
  '@babel/core@<7.29.6': 7.29.6
  # ESLint 9 still resolves Ajv 6 through @eslint/eslintrc.
  ajv@<6.14.0: 6.14.0
  # minimatch 3 consumers still permit vulnerable brace-expansion 1 releases.
  brace-expansion@<1.1.16: 1.1.16
  # minimatch 10 consumers still permit vulnerable brace-expansion 5 releases.
  brace-expansion@>=5.0.0 <5.0.7: 5.0.7
  # tsx still permits esbuild releases below the patched version.
  esbuild@<0.28.1: 0.28.1
  # Ajv 8 consumers still permit vulnerable fast-uri releases.
  fast-uri@<3.1.4: 3.1.4
  # ESLint's cache still permits vulnerable flatted releases.
  flatted@<3.4.2: 3.4.2
  # gray-matter is pinned to the js-yaml 3 release line.
  js-yaml@<3.15.0: 3.15.0
  # Storybook and other tooling still permit vulnerable js-yaml 4 releases.
  js-yaml@>=4.0.0 <4.3.0: 4.3.0
  # Tooling still permits lodash 4.17, whose fix is only available in 4.18.
  lodash@<4.18.0: 4.18.0
  # Tooling on minimatch 9 still permits vulnerable patch releases.
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  # Tooling on minimatch 10 still permits vulnerable patch releases.
  minimatch@>=10.0.0 <10.2.3: 10.2.3
  # Next.js pins an older PostCSS range; keep this path-scoped until upstream updates it.
  next>postcss: 8.5.22
  # Next.js pins sharp below its patched range; keep this path-scoped until upstream updates it.
  next>sharp: 0.35.0
  # Drizzle's gel dependency still permits vulnerable shell-quote releases.
  shell-quote@<1.9.0: 1.9.0
  # jsdom and Storybook still permit vulnerable ws 8 releases.
  ws@<8.21.0: 8.21.0
  # lint-staged still permits vulnerable yaml 2 releases.
  yaml@<2.8.3: 2.8.3
