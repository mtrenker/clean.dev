name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "k8s/**"
      - ".github/workflows/deploy.yaml"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.json"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "k8s/**"
      - ".github/workflows/deploy.yaml"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.json"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mtrenker/clean-dev

jobs:
  build-and-deploy:
    # This is a public repository. Do not run build/deploy jobs for fork PRs:
    # PR code is untrusted and Docker builds execute repository-controlled scripts.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        if: github.event_name == 'pull_request'
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          # No DATABASE_URL: /api/health deliberately skips the database check
          # when it is unset, which is what an isolated container can satisfy.
          CONTAINER_ID=$(docker run -d \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e AUTH_SECRET=test-secret-test-secret-test-secret-test-secret \
            -e GITHUB_ID=dummy \
            -e GITHUB_SECRET=dummy \
            -e LINKEDIN_CLIENT_ID=dummy \
            -e LINKEDIN_CLIENT_SECRET=dummy \
            -e ALLOWED_GITHUB_USERS=mtrenker \
            "$IMAGE_TAG")
          trap 'docker logs "$CONTAINER_ID"; docker rm -f "$CONTAINER_ID"' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health; then
              echo; echo "healthy after ${attempt} attempt(s)"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy within 30s" >&2
          exit 1

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kustomize build k8s > /tmp/k8s-rendered.yaml
          grep -q 'name: FEATURE_REVIEW_LINKS' k8s/deployment.yaml
          grep -q 'name: REVIEW_LINK_SECRET' k8s/deployment.yaml
          grep -q 'name: REVIEW_RECIPIENT_EMAIL' k8s/deployment.yaml
          grep -q 'name: NEXTAUTH_URL' k8s/deployment.yaml
          grep -q 'name: review-links-config-preflight' k8s/deployment.yaml

      - name: Update Kustomize image tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cd k8s
          # Extract the immutable SHA-based tag (format: sha-<sha>)
          NEW_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep -E 'sha-[a-f0-9]+' | head -n1 | cut -d':' -f2)
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${NEW_TAG}
          cat kustomization.yaml

      - name: Commit and push kustomization
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/kustomization.yaml
          git commit -m "Deploy: Update image to $(echo '${{ steps.meta.outputs.tags }}' | head -n1 | cut -d':' -f2)" || exit 0
          git push
